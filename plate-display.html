<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>NEST Plate Championship – Live Display</title>

  <!-- Dedicated NEST Plate display styling -->
  <link rel="stylesheet" href="plate-display.css?v=1">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/12.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.8.0/firebase-database-compat.js"></script>
  <script src="firebase-init.js" defer></script>

  <!-- Dedicated NEST Plate display logic -->
  <script src="plate-display.js?v=1" defer></script>
</head>

<body>
  <div class="display-shell">

    <!-- Sponsor ticker -->
    <header class="sponsor-strip" aria-label="Tournament sponsors">
      <div class="sponsor-strip-window">
        <div id="sponsorTickerTrack" class="sponsor-ticker-track">
          Loading sponsors…
        </div>
      </div>
    </header>

    <!-- Connection indicator -->
    <div class="display-status-bar">
      <div class="display-live-status">
        <span
          id="displayLiveDot"
          class="display-live-dot"
          aria-hidden="true"
        ></span>

        <span id="displayLiveText">
          Connecting…
        </span>
      </div>

      <div class="display-mode-label">
        NEST Plate Championship
      </div>
    </div>

    <main class="display-stage">
      <section
        class="display-view display-knockout-view plate-display-view"
        aria-label="Live NEST Plate Championship bracket"
      >
        <div class="display-knockout-heading">
          <h1 class="plate-display-title">
            NEST Plate Championship
          </h1>
        </div>

        <div
          id="plateDisplayBracket"
          class="display-knockout-bracket plate-display-bracket"
          aria-live="polite"
        >
          <p class="display-loading">
            Loading NEST Plate Championship…
          </p>
        </div>

        <div
          id="plateMainSponsor"
          class="main-sponsor-brand knockout-main-sponsor"
          aria-label="Main tournament sponsor"
        >
          Loading main sponsor…
        </div>
      </section>
    </main>
  </div>
</body>
</html>
